<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a2a4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Đole Servis">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Đole Servis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', sans-serif; background: #dde4ed; color: #222; min-height: 100vh; }

.header {
  background: #1a2a4a; color: #fff;
  padding: 12px 16px;
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; text-align: center;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.header img { height: 52px; }
.header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.header h1 span { color: #7ec8e3; }
#drive-status { font-size: 0.72rem; color: #7ec8e3; letter-spacing: 0.05em; }

.tabs { background: #243554; display: flex; }
.tab-btn {
  flex: 1; padding: 11px 4px; border: none; background: transparent;
  color: #a0b8d0; font-size: 0.8rem; cursor: pointer;
  border-bottom: 3px solid transparent;
}
.tab-btn.active { color: #fff; border-bottom: 3px solid #7ec8e3; background: #1a2a4a; }

.page { padding: 12px; max-width: 600px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* BTN NOVI */
.btn-novi {
  display: block; width: 100%; padding: 14px;
  background: #1a7abf; color: #fff;
  font-size: 1.05rem; font-weight: 700; border: none; border-radius: 8px;
  cursor: pointer; margin-bottom: 14px;
  box-shadow: 0 3px 10px rgba(26,122,191,0.3);
}

/* FILTER */
.filter-box {
  background: #fff; border-radius: 8px; padding: 10px;
  margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.filter-box input, .filter-box select {
  width: 100%; padding: 9px 11px; border: 1px solid #c0d0e0;
  border-radius: 6px; font-size: 0.95rem; margin-bottom: 6px;
  outline: none; background: #fff;
}
.filter-box input:last-child, .filter-box select:last-child { margin-bottom: 0; }
.filter-row2 { display: flex; gap: 6px; }
.filter-row2 input { flex: 1; margin-bottom: 0 !important; }
.btn-reset-f {
  padding: 9px 12px; background: #e0e8f0; color: #445;
  border: none; border-radius: 6px; font-size: 0.88rem; cursor: pointer; white-space: nowrap;
}

/* STATS */
.stats-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.stat-pill {
  background: #1a2a4a; color: #7ec8e3;
  border-radius: 16px; padding: 4px 12px;
  font-size: 0.78rem; font-weight: 600; white-space: nowrap;
}
.stat-pill span { color: #fff; }

/* KARTICE POSLOVA */
.posao-card {
  background: #fff; border-radius: 8px;
  padding: 12px 14px; margin-bottom: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border-left: 4px solid #c0d0e0;
  cursor: pointer; transition: background 0.12s;
}
.posao-card:active { background: #f0f6fb; }
.posao-card.naplaceno { border-left-color: #27ae60; background: #edfaf3; }
.posao-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 8px; }
.posao-ime { font-weight: 700; color: #1a7abf; font-size: 1rem; }
.posao-datum { font-size: 0.78rem; color: #789; white-space: nowrap; }
.posao-opis { font-size: 0.88rem; color: #334; margin-bottom: 6px; line-height: 1.4; }
.posao-footer { display: flex; justify-content: space-between; align-items: center; }
.posao-cena { font-weight: 700; color: #1a2a4a; font-size: 0.95rem; }
.posao-status { font-size: 0.82rem; font-weight: 700; }
.posao-status.ok { color: #27ae60; }
.posao-status.ne { color: #c0392b; }

.kat-badge {
  display: inline-block; border-radius: 4px; padding: 1px 7px;
  font-size: 0.72rem; font-weight: 700; white-space: nowrap; margin-bottom: 4px;
}
.kat-BT { background: #e3f0fb; color: #1a6aaf; }
.kat-VN { background: #f3e8fb; color: #7a1abf; }
.kat-KL { background: #e8f9f0; color: #1a7a50; }

.empty-msg { text-align: center; color: #aaa; padding: 32px; font-size: 0.95rem; }

/* PAGINACIJA */
.pag-wrap { display: flex; align-items: center; justify-content: center; gap: 5px; margin: 12px 0; flex-wrap: wrap; }
.pag-btn {
  padding: 7px 12px; border: 1px solid #c0d0e0; border-radius: 6px;
  background: #fff; color: #445; font-size: 0.88rem; cursor: pointer;
}
.pag-btn.active { background: #1a7abf; color: #fff; border-color: #1a7abf; font-weight: 700; }
.pag-btn:disabled { opacity: 0.35; cursor: default; }
.pag-info { font-size: 0.8rem; color: #789; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 500;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 16px 16px 0 0;
  padding: 20px 18px 30px; width: 100%; max-width: 600px;
  max-height: 92vh; overflow-y: auto;
}
.modal-handle { width: 40px; height: 4px; background: #c0d0e0; border-radius: 2px; margin: 0 auto 16px; }
.modal h2 { font-size: 1.05rem; color: #1a2a4a; margin-bottom: 16px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 0.75rem; font-weight: 700; color: #556; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.form-row input, .form-row textarea, .form-row select {
  width: 100%; padding: 11px 13px;
  border: 1px solid #c0d0e0; border-radius: 7px;
  font-size: 1rem; font-family: inherit; outline: none;
  -webkit-appearance: none;
}
.form-row textarea { min-height: 80px; resize: vertical; }
.cena-row { display: flex; gap: 8px; }
.cena-row input { flex: 1; }
.cena-row select { width: 88px; }
.nap-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding: 12px; background: #f5f8fc; border-radius: 7px; }
.nap-row input[type=checkbox] { width: 22px; height: 22px; accent-color: #27ae60; }
.nap-row label { font-size: 1rem; font-weight: 600; color: #1a2a4a; }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; }
.btn-save { flex: 1; padding: 13px; background: #1a7abf; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; }
.btn-cancel { padding: 13px 16px; background: #e0e8f0; color: #445; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
.btn-delete { padding: 13px 16px; background: #c0392b; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }

/* SLIKE */
.slike-section { margin-top: 14px; border-top: 1px solid #e8eef4; padding-top: 14px; }
.slike-section h3 { font-size: 0.85rem; font-weight: 700; color: #556; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
.slike-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
.slike-thumb {
  aspect-ratio: 1; object-fit: cover; border-radius: 6px;
  cursor: pointer; width: 100%;
}
.btn-upload {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 11px; background: #e8f2fb; color: #1a7abf;
  border: 2px dashed #1a7abf; border-radius: 8px;
  font-size: 0.95rem; font-weight: 600; cursor: pointer;
}
.upload-progress { font-size: 0.82rem; color: #789; text-align: center; margin-top: 6px; }

/* VIEW DETALJI */
.view-field { margin-bottom: 11px; }
.view-field .lbl { font-size: 0.72rem; font-weight: 700; color: #789; text-transform: uppercase; letter-spacing: 0.04em; }
.view-field .val { font-size: 0.97rem; color: #1a2a4a; white-space: pre-wrap; word-break: break-word; margin-top: 2px; }

/* IMENIK */
.klijent-card {
  background: #fff; border-radius: 8px; padding: 13px 14px;
  margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  cursor: pointer;
}
.klijent-card:active { background: #f0f6fb; }
.klijent-ime { font-weight: 700; color: #1a7abf; font-size: 1rem; }
.klijent-tel { font-size: 0.88rem; color: #445; margin-top: 2px; }
.klijent-lok { font-size: 0.82rem; color: #789; margin-top: 1px; }
.klijent-cnt { font-size: 0.78rem; color: #789; background: #eef2f7; border-radius: 10px; padding: 2px 10px; display: inline-block; margin-top: 5px; }

/* BILANS */
.bilans-card { background: #fff; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-top: 4px solid #1a7abf; }
.bilans-card.zelena { border-top-color: #27ae60; }
.bilans-card.crvena { border-top-color: #e74c3c; }
.bc-label { font-size: 0.75rem; font-weight: 700; color: #789; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.bc-val { font-size: 1.4rem; font-weight: 700; color: #1a2a4a; }
.bc-sub { font-size: 0.78rem; color: #aaa; margin-top: 2px; }

/* FULLSCREEN SLIKA */
.fs-overlay {
  display: none; position: fixed; inset: 0;
  background: #000; z-index: 1000;
  align-items: center; justify-content: center; flex-direction: column;
}
.fs-overlay.open { display: flex; }
.fs-img { max-width: 100%; max-height: 85vh; object-fit: contain; }
.fs-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 1.6rem; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
.fs-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: #fff; font-size: 2rem; padding: 10px 16px; border-radius: 6px; cursor: pointer; }
.fs-prev { left: 8px; }
.fs-next { right: 8px; }
.fs-counter { position: absolute; bottom: 20px; color: #aaa; font-size: 0.88rem; }

/* AC */
.ac-dropdown {
  position: absolute; left: 0; right: 0; z-index: 200;
  background: #fff; border: 1px solid #b0c4d8; border-top: none;
  border-radius: 0 0 7px 7px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  max-height: 200px; overflow-y: auto;
}
.ac-item { padding: 11px 13px; cursor: pointer; border-bottom: 1px solid #f0f4f8; }
.ac-item:active { background: #e8f2fb; }
.ac-ime { font-weight: 700; color: #1a2a4a; font-size: 0.97rem; }
.ac-sub { font-size: 0.8rem; color: #789; margin-top: 1px; }
</style>
</head>

  <h1>Đole — <span>Servis Bele Tehnike</span></h1>
  <div id="drive-status">⏳ Učitavam...</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('poslovi',this)">📋 Poslovi</button>
  <button class="tab-btn" onclick="switchTab('imenik',this)">📞 Imenik</button>
  <button class="tab-btn" onclick="switchTab('bilans',this)">💰 Bilans</button>
</div>

<div class="page">

<!-- POSLOVI -->
<div id="tab-poslovi" class="tab-content active">
  <button class="btn-novi" onclick="otvoriNovi()">➕ NOVI UNOS</button>
  <div class="stats-bar" id="stats-bar"></div>
  <div class="filter-box">
    <input type="text" id="s-text" placeholder="Pretraga: ime, opis, lokacija..." oninput="pagP=1;renderPoslovi()">
    <select id="s-kat" onchange="pagP=1;renderPoslovi()">
      <option value="">— Sve kategorije —</option>
      <option value="BELA TEHNIKA">🔧 Bela tehnika</option>
      <option value="VIDEO NADZOR">📷 Video nadzor</option>
      <option value="UGRADNJA KLIMA UREĐAJA">❄️ Klima uređaji</option>
    </select>
    <div class="filter-row2">
      <input type="date" id="s-od" onchange="pagP=1;renderPoslovi()">
      <input type="date" id="s-do" onchange="pagP=1;renderPoslovi()">
      <button class="btn-reset-f" onclick="resetFilter()">✕</button>
    </div>
  </div>
  <div id="lista-poslovi"></div>
  <div class="pag-wrap" id="pag-poslovi"></div>
</div>

<!-- IMENIK -->
<div id="tab-imenik" class="tab-content">
  <div class="filter-box">
    <input type="text" id="s-imenik" placeholder="Pretraga po imenu, telefonu..." oninput="renderImenik()">
  </div>
  <div id="imenik-lista"></div>
</div>

<!-- BILANS -->
<div id="tab-bilans" class="tab-content">
  <div class="filter-box">
    <select id="b-kat" onchange="renderBilans()">
      <option value="">— Sve kategorije —</option>
      <option value="BELA TEHNIKA">🔧 Bela tehnika</option>
      <option value="VIDEO NADZOR">📷 Video nadzor</option>
      <option value="UGRADNJA KLIMA UREĐAJA">❄️ Klima uređaji</option>
    </select>
    <div class="filter-row2">
      <input type="date" id="b-od" onchange="renderBilans()">
      <input type="date" id="b-do" onchange="renderBilans()">
    </div>
    <select id="b-val" onchange="renderBilans()">
      <option value="">Sve valute</option>
      <option value="RSD">RSD</option>
      <option value="EUR">EUR</option>
    </select>
    <button class="btn-reset-f" onclick="resetBilans()" style="width:100%;margin-top:4px">Reset</button>
  </div>
  <div id="bilans-cards"></div>
</div>

</div>

<!-- MODAL: UNOS/EDIT -->
<div class="modal-overlay" id="modal-unos">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Novi unos</h2>
    <input type="hidden" id="edit-id">
    <div class="form-row"><label>Datum</label><input type="date" id="f-datum"></div>
    <div class="form-row" style="position:relative">
      <label>Ime i prezime</label>
      <input type="text" id="f-ime" placeholder="Počnite da kucate..." autocomplete="off" oninput="acInput()" onfocus="acInput()">
      <div class="ac-dropdown" id="ac-list" style="display:none"></div>
    </div>
    <div class="form-row"><label>Telefon</label><input type="text" id="f-tel" autocomplete="off" inputmode="tel"></div>
    <div class="form-row"><label>Lokacija / Adresa</label><input type="text" id="f-lok" autocomplete="off"></div>
    <div class="form-row">
      <label>Kategorija</label>
      <select id="f-kat">
        <option value="BELA TEHNIKA">🔧 Bela tehnika</option>
        <option value="VIDEO NADZOR">📷 Video nadzor</option>
        <option value="UGRADNJA KLIMA UREĐAJA">❄️ Ugradnja klima uređaja</option>
      </select>
    </div>
    <div class="form-row"><label>Opis posla</label><textarea id="f-opis" placeholder="Opis kvara, urađenog posla..."></textarea></div>
    <div class="form-row">
      <label>Cena rada</label>
      <div class="cena-row">
        <input type="number" id="f-cena" placeholder="0" min="0" inputmode="decimal">
        <select id="f-val"><option value="RSD">RSD</option><option value="EUR">EUR</option></select>
      </div>
    </div>
    <div class="nap-row">
      <input type="checkbox" id="f-nap">
      <label for="f-nap">Naplaćeno</label>
    </div>
    <div class="modal-btns">
      <button class="btn-delete" id="btn-del" onclick="obrisi()" style="display:none">🗑</button>
      <button class="btn-cancel" onclick="closeModal('modal-unos')">Otkaži</button>
      <button class="btn-save" onclick="sacuvaj()">Sačuvaj</button>
    </div>
  </div>
</div>

<!-- MODAL: VIEW -->
<div class="modal-overlay" id="modal-view">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Detalji posla</h2>
    <div id="view-content"></div>
    <!-- SLIKE SEKCIJA -->
    <div class="slike-section">
      <h3>📷 Slike</h3>
      <div class="slike-grid" id="slike-grid"></div>
      <label class="btn-upload" style="margin-bottom:8px">
        🖼 Galerija (više slika)
        <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="uploadSlike(this)">
      </label>
      <label class="btn-upload" style="background:#e8f5e9;border-color:#27ae60;color:#1a7a50">
        📷 Slikaj odmah
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="uploadSlike(this)">
      </label>
      <div class="upload-progress" id="upload-progress"></div>
    </div>
    <div class="modal-btns" style="margin-top:14px">
      <button class="btn-cancel" onclick="closeModal('modal-view')">Zatvori</button>
      <button class="btn-save" onclick="urediIzView()">✏ Uredi</button>
    </div>
  </div>
</div>

<!-- FULLSCREEN SLIKA -->
<div class="fs-overlay" id="fs-overlay">
  <button class="fs-close" onclick="closeFull()">✕</button>
  <button class="fs-nav fs-prev" id="fs-prev" onclick="fsNav(-1)">‹</button>
  <img class="fs-img" id="fs-img" src="" alt="">
  <button class="fs-nav fs-next" id="fs-next" onclick="fsNav(1)">›</button>
  <div class="fs-counter" id="fs-counter"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxd_ksfK1eOy_amkJtxO37ZVVgUpU-neCmFGwzBgv3b2PEIHAWGVpZq8cBcpiiz59nB/exec';
const PER_PAGE = 20;
const KAT_CSS = {'BELA TEHNIKA':'kat-BT','VIDEO NADZOR':'kat-VN','UGRADNJA KLIMA UREĐAJA':'kat-KL'};
const KAT_LABEL = {'BELA TEHNIKA':'🔧 Bela tehnika','VIDEO NADZOR':'📷 Video nadzor','UGRADNJA KLIMA UREĐAJA':'❄️ Klima uređaji'};

let _cache = [];
let _saving = false;
let _saveTimer = null;
let viewId = null;
let pagP = 1;
let fsImages = [], fsIdx = 0;
let acFiltered = [];

function showStatus(msg, color) {
  const el = document.getElementById('drive-status');
  el.textContent = msg;
  el.style.color = color || '#7ec8e3';
}

// ===== API POZIVI =====
function apiGet(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now();
    const url = API + '?' + new URLSearchParams({...params, callback: cb});
    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => reject(new Error('Network error'));
    window[cb] = (data) => {
      delete window[cb];
      document.head.removeChild(script);
      resolve(data);
    };
    document.head.appendChild(script);
    setTimeout(() => reject(new Error('Timeout')), 15000);
  });
}

async function apiPost(params, body) {
  // POST ide kroz fetch sa no-cors, pa koristimo GET sa encoded body
  const encoded = btoa(unescape(encodeURIComponent(typeof body === 'string' ? body : JSON.stringify(body))));
  return apiGet({...params, data: encoded});
}

function load() { return _cache; }

function save(d) {
  _cache = d;
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => pushToDrive(d), 800);
}

async function pushToDrive(d) {
  if (_saving) return;
  _saving = true;
  showStatus('💾 Čuvam...', '#f0a500');
  try {
    const r = await apiPost({ action: 'save' }, d);
    showStatus(r.ok ? '✅ Sačuvano' : '❌ ' + (r.error||'Greška'), r.ok ? '#27ae60' : '#e74c3c');
  } catch(e) {
    showStatus('❌ ' + e.message, '#e74c3c');
  }
  _saving = false;
  setTimeout(() => showStatus('🟢 Povezano', '#27ae60'), 2000);
}

async function initDrive() {
  showStatus('⏳ Učitavam...', '#f0a500');
  try {
    const data = await apiGet({ action: 'load' });
    _cache = Array.isArray(data) ? data : [];
    let ch = false;
    _cache.forEach(p => { if(!p.kategorija){p.kategorija='BELA TEHNIKA';ch=true;} });
    if(ch) save(_cache);
    showStatus('🟢 Povezano', '#27ae60');
  } catch(e) {
    showStatus('❌ Greška konekcije', '#e74c3c');
    _cache = [];
  }
  renderPoslovi();
}

// ===== TABS =====
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if(name==='poslovi') renderPoslovi();
  if(name==='imenik') renderImenik();
  if(name==='bilans') renderBilans();
}

// ===== POSLOVI =====
function renderPoslovi() {
  const data = load();
  const q = (document.getElementById('s-text').value||'').toLowerCase().trim();
  const kat = document.getElementById('s-kat').value;
  const od = document.getElementById('s-od').value;
  const doo = document.getElementById('s-do').value;
  let f = data.filter(p => {
    if(kat && p.kategorija!==kat) return false;
    if(od && (p.datum||'')<od) return false;
    if(doo && (p.datum||'')>doo) return false;
    if(q) return (p.ime||'').toLowerCase().includes(q)||(p.telefon||'').toLowerCase().includes(q)||
                  (p.opis||'').toLowerCase().includes(q)||(p.lokacija||'').toLowerCase().includes(q);
    return true;
  });
  f.sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));

  const nap = f.filter(p=>p.naplaceno).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-pill">Ukupno: <span>${data.length}</span></div>
    <div class="stat-pill">Prikaz: <span>${f.length}</span></div>
    <div class="stat-pill">✅ <span>${nap}</span></div>
    <div class="stat-pill">❌ <span>${f.length-nap}</span></div>
  `;

  const el = document.getElementById('lista-poslovi');
  if(!f.length){el.innerHTML='<div class="empty-msg">Nema pronađenih unosa.</div>';renderPagP(0,1);return;}
  const pages = Math.ceil(f.length/PER_PAGE);
  if(pagP>pages) pagP=pages;
  const slice = f.slice((pagP-1)*PER_PAGE, pagP*PER_PAGE);
  el.innerHTML = slice.map(p=>`
    <div class="posao-card ${p.naplaceno?'naplaceno':''}" onclick="viewPosao('${p.id}')">
      <div class="posao-header">
        <div class="posao-ime">${esc(p.ime||'—')}</div>
        <div class="posao-datum">${fDat(p.datum)}</div>
      </div>
      <div>${katBadge(p.kategorija)}</div>
      <div class="posao-opis">${esc(kratko(p.opis,80))}</div>
      <div class="posao-footer">
        <div class="posao-cena">${fCena(p.cena,p.valuta)}</div>
        <div class="posao-status ${p.naplaceno?'ok':'ne'}">${p.naplaceno?'✅ Naplaćeno':'❌ Nije naplaćeno'}</div>
      </div>
    </div>
  `).join('');
  renderPagP(f.length, pages);
}

function resetFilter(){
  document.getElementById('s-text').value='';
  document.getElementById('s-kat').value='';
  document.getElementById('s-od').value='';
  document.getElementById('s-do').value='';
  pagP=1; renderPoslovi();
}

function renderPagP(total, pages) {
  const el = document.getElementById('pag-poslovi');
  if(pages<=1){el.innerHTML='';return;}
  let h = `<button class="pag-btn" onclick="pagP=Math.max(1,pagP-1);renderPoslovi()" ${pagP===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=pages;i++) h+=`<button class="pag-btn${i===pagP?' active':''}" onclick="pagP=${i};renderPoslovi()">${i}</button>`;
  h+=`<button class="pag-btn" onclick="pagP=Math.min(${pages},pagP+1);renderPoslovi()" ${pagP===pages?'disabled':''}>›</button>`;
  h+=`<span class="pag-info">${(pagP-1)*PER_PAGE+1}–${Math.min(pagP*PER_PAGE,total)} od ${total}</span>`;
  el.innerHTML = h;
}

// ===== VIEW =====
function viewPosao(id) {
  const p = load().find(x=>x.id===id);
  if(!p) return;
  viewId = id;
  document.getElementById('view-content').innerHTML = `
    <div class="view-field"><div class="lbl">Datum</div><div class="val">${fDat(p.datum)}</div></div>
    <div class="view-field"><div class="lbl">Ime i prezime</div><div class="val">${esc(p.ime||'—')}</div></div>
    <div class="view-field"><div class="lbl">Telefon</div><div class="val">${esc(p.telefon||'—')}</div></div>
    <div class="view-field"><div class="lbl">Lokacija</div><div class="val">${esc(p.lokacija||'—')}</div></div>
    <div class="view-field"><div class="lbl">Kategorija</div><div class="val">${katBadge(p.kategorija)}</div></div>
    <div class="view-field"><div class="lbl">Opis posla</div><div class="val">${esc(p.opis||'—')}</div></div>
    <div class="view-field"><div class="lbl">Cena</div><div class="val">${fCena(p.cena,p.valuta)}</div></div>
    <div class="view-field"><div class="lbl">Naplaćeno</div><div class="val">${p.naplaceno?'✅ Da':'❌ Ne'}</div></div>
  `;
  document.getElementById('slike-grid').innerHTML = '<div style="color:#aaa;font-size:0.85rem">⏳ Učitavam slike...</div>';
  document.getElementById('upload-progress').textContent = '';
  openModal('modal-view');
  ucitajSlike(id);
}

async function ucitajSlike(posaoId) {
  try {
    const slike = await apiGet({ action: 'loadImages', posaoId });
    const grid = document.getElementById('slike-grid');
    if(!Array.isArray(slike)||!slike.length){
      grid.innerHTML='<div style="color:#aaa;font-size:0.85rem">Nema slika.</div>';
      return;
    }
    grid.innerHTML = slike.map((s,i)=>`
      <img class="slike-thumb" src="${s.url}" onclick="openFull(${i})" data-url="${s.url}">
    `).join('');
    // Sačuvaj za fullscreen
    window._currentSlike = slike;
  } catch(e) {
    document.getElementById('slike-grid').innerHTML='<div style="color:#e74c3c;font-size:0.82rem">Greška učitavanja slika.</div>';
  }
}

async function uploadSlike(input) {
  if(!input.files||!input.files.length) return;
  const files = Array.from(input.files);
  const prog = document.getElementById('upload-progress');
  prog.textContent = '⏳ 0 / ' + files.length;
  let ok = 0, fail = 0;
  for(let i=0; i<files.length; i++) {
    const file = files[i];
    prog.textContent = '⏳ ' + (i+1) + ' / ' + files.length + ' — ' + file.name;
    try {
      const base64 = await fileToBase64(file);
      const encoded = btoa(unescape(encodeURIComponent(base64)));
      const data = await apiGet({
        action: 'uploadImage',
        posaoId: viewId,
        fileName: encodeURIComponent(file.name),
        data: encoded
      });
      if(data.ok) ok++; else fail++;
    } catch(e) { fail++; }
  }
  prog.textContent = ok + ' sačuvano' + (fail ? ', ' + fail + ' greška' : '') + ' ✅';
  input.value = '';
  ucitajSlike(viewId);
  setTimeout(()=>prog.textContent='', 4000);
}

function fileToBase64(file) {
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = ()=>rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

function openFull(idx) {
  const slike = window._currentSlike || [];
  if(!slike.length) return;
  fsImages = slike;
  fsIdx = idx;
  fsPrikazi();
  document.getElementById('fs-overlay').classList.add('open');
}

function fsPrikazi() {
  document.getElementById('fs-img').src = fsImages[fsIdx].url;
  document.getElementById('fs-counter').textContent = `${fsIdx+1} / ${fsImages.length}`;
  document.getElementById('fs-prev').disabled = fsIdx===0;
  document.getElementById('fs-next').disabled = fsIdx===fsImages.length-1;
}

function fsNav(dir) {
  const novi = fsIdx+dir;
  if(novi>=0 && novi<fsImages.length){fsIdx=novi;fsPrikazi();}
}

function closeFull() {
  document.getElementById('fs-overlay').classList.remove('open');
}

function urediIzView(){closeModal('modal-view');otvoriEdit(viewId);}

// ===== UNOS =====
function otvoriNovi(){
  document.getElementById('modal-title').textContent='Novi unos';
  document.getElementById('edit-id').value='';
  document.getElementById('f-datum').value=today();
  document.getElementById('f-ime').value='';
  document.getElementById('f-tel').value='';
  document.getElementById('f-lok').value='';
  document.getElementById('f-kat').value='BELA TEHNIKA';
  document.getElementById('f-opis').value='';
  document.getElementById('f-cena').value='';
  document.getElementById('f-val').value='RSD';
  document.getElementById('f-nap').checked=false;
  document.getElementById('btn-del').style.display='none';
  document.getElementById('ac-list').style.display='none';
  openModal('modal-unos');
  setTimeout(()=>document.getElementById('f-ime').focus(),200);
}

function otvoriEdit(id){
  const p=load().find(x=>x.id===id);if(!p)return;
  document.getElementById('modal-title').textContent='Uredi unos';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-datum').value=p.datum||'';
  document.getElementById('f-ime').value=p.ime||'';
  document.getElementById('f-tel').value=p.telefon||'';
  document.getElementById('f-lok').value=p.lokacija||'';
  document.getElementById('f-kat').value=p.kategorija||'BELA TEHNIKA';
  document.getElementById('f-opis').value=p.opis||'';
  document.getElementById('f-cena').value=p.cena!==undefined?p.cena:'';
  document.getElementById('f-val').value=p.valuta||'RSD';
  document.getElementById('f-nap').checked=!!p.naplaceno;
  document.getElementById('btn-del').style.display='inline-block';
  document.getElementById('ac-list').style.display='none';
  openModal('modal-unos');
}

function sacuvaj(){
  const data=load();
  const id=document.getElementById('edit-id').value;
  const ime=document.getElementById('f-ime').value.trim();
  const dat=document.getElementById('f-datum').value;
  if(!ime){alert('Unesite ime!');return;}
  if(!dat){alert('Unesite datum!');return;}
  const u={
    id:id||genId(), datum:dat, ime,
    telefon:document.getElementById('f-tel').value.trim(),
    lokacija:document.getElementById('f-lok').value.trim(),
    kategorija:document.getElementById('f-kat').value,
    opis:document.getElementById('f-opis').value.trim(),
    cena:parseFloat(document.getElementById('f-cena').value)||0,
    valuta:document.getElementById('f-val').value,
    naplaceno:document.getElementById('f-nap').checked,
  };
  if(id){const i=data.findIndex(x=>x.id===id);if(i>=0)data[i]=u;}
  else data.push(u);
  save(data);
  closeModal('modal-unos');
  renderPoslovi();
}

function obrisi(){
  const id=document.getElementById('edit-id').value;
  if(!id||!confirm('Obrisati ovaj unos?'))return;
  save(load().filter(x=>x.id!==id));
  closeModal('modal-unos');
  renderPoslovi();
}

// ===== AUTOCOMPLETE =====
function getKlijenti(){
  const map={};
  const sorted=[...load()].sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));
  sorted.forEach(p=>{
    const k=nk(p.ime);if(!k)return;
    if(!map[k])map[k]={ime:p.ime,telefon:p.telefon||'',lokacija:p.lokacija||''};
    else{if(p.telefon&&!map[k].telefon)map[k].telefon=p.telefon;if(p.lokacija&&!map[k].lokacija)map[k].lokacija=p.lokacija;}
  });
  return Object.values(map).sort((a,b)=>(a.ime||'').localeCompare(b.ime||'','sr'));
}

function acInput(){
  const q=(document.getElementById('f-ime').value||'').toLowerCase().trim();
  const lista=document.getElementById('ac-list');
  if(document.getElementById('edit-id').value){lista.style.display='none';return;}
  const klijenti=getKlijenti();
  acFiltered=q?klijenti.filter(k=>(k.ime||'').toLowerCase().includes(q)):klijenti;
  if(!acFiltered.length){lista.style.display='none';return;}
  lista.innerHTML=acFiltered.map((k,i)=>`
    <div class="ac-item" data-i="${i}">
      <div class="ac-ime">${esc(k.ime)}</div>
      <div class="ac-sub">${k.telefon?esc(k.telefon):''}${k.telefon&&k.lokacija?' · ':''}${k.lokacija?esc(k.lokacija):''}</div>
    </div>
  `).join('');
  lista.querySelectorAll('.ac-item').forEach((el,i)=>{
    el.addEventListener('pointerdown',e=>{e.preventDefault();acSelect(i);});
  });
  lista.style.display='block';
}

function acSelect(i){
  const k=acFiltered[i];if(!k)return;
  document.getElementById('f-ime').value=k.ime;
  document.getElementById('f-tel').value=k.telefon||'';
  document.getElementById('f-lok').value=k.lokacija||'';
  document.getElementById('ac-list').style.display='none';
  setTimeout(()=>document.getElementById('f-opis').focus(),50);
}

document.getElementById('f-ime').addEventListener('blur',()=>{
  setTimeout(()=>{document.getElementById('ac-list').style.display='none';},150);
});

// ===== IMENIK =====
function renderImenik(){
  const data=load();
  const q=(document.getElementById('s-imenik').value||'').toLowerCase().trim();
  const map={};
  const sorted=[...data].sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));
  sorted.forEach(p=>{
    const k=nk(p.ime);if(!k)return;
    if(!map[k])map[k]={ime:p.ime,telefon:p.telefon||'',lokacija:p.lokacija||'',poslovi:[]};
    if(p.telefon)map[k].telefon=p.telefon;
    if(p.lokacija)map[k].lokacija=p.lokacija;
    map[k].poslovi.push(p);
  });
  let lista=Object.values(map);
  if(q)lista=lista.filter(k=>(k.ime||'').toLowerCase().includes(q)||(k.telefon||'').toLowerCase().includes(q));
  lista.sort((a,b)=>(a.ime||'').localeCompare(b.ime||'','sr'));
  const el=document.getElementById('imenik-lista');
  if(!lista.length){el.innerHTML='<div class="empty-msg">Nema klijenata.</div>';return;}
  el.innerHTML=lista.map(k=>`
    <div class="klijent-card" onclick="showHistory(${JSON.stringify(k.ime)})">
      <div class="klijent-ime">${esc(k.ime||'—')}</div>
      <div class="klijent-tel">${esc(k.telefon||'—')}</div>
      <div class="klijent-lok">${esc(k.lokacija||'')}</div>
      <div class="klijent-cnt">${k.poslovi.length} posao/poslova</div>
    </div>
  `).join('');
}

function showHistory(ime){
  const poslovi=load().filter(p=>nk(p.ime)===nk(ime)).sort((a,b)=>(b.datum||'').localeCompare(a.datum||''));
  // Prikaži kao modal sa listom poslova
  const el=document.getElementById('view-content');
  el.innerHTML=`<div style="font-weight:700;font-size:1rem;color:#1a2a4a;margin-bottom:12px">${esc(ime)}</div>`+
    poslovi.map(p=>`
      <div style="background:#f5f8fc;border-radius:7px;padding:10px 12px;margin-bottom:8px;border-left:4px solid ${p.naplaceno?'#27ae60':'#1a7abf'};cursor:pointer"
           onclick="closeModal('modal-view');viewPosao('${p.id}')">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:0.82rem;color:#789">${fDat(p.datum)}</span>
          <span style="font-weight:700">${fCena(p.cena,p.valuta)}</span>
        </div>
        <div style="font-size:0.88rem;color:#334">${esc(kratko(p.opis,60))}</div>
        <div style="font-size:0.78rem;font-weight:700;margin-top:4px;color:${p.naplaceno?'#27ae60':'#c0392b'}">${p.naplaceno?'✅ Naplaćeno':'❌ Nije naplaćeno'}</div>
      </div>
    `).join('');
  document.getElementById('slike-grid').innerHTML='';
  document.getElementById('upload-progress').textContent='';
  // Sakrij upload sekciju za history view
  document.querySelector('.slike-section').style.display='none';
  openModal('modal-view');
}

// Vrati slike sekciju pri normalnom view
const origViewPosao = viewPosao;

// ===== BILANS =====
function renderBilans(){
  const data=load();
  const kat=document.getElementById('b-kat').value;
  const od=document.getElementById('b-od').value;
  const doo=document.getElementById('b-do').value;
  const val=document.getElementById('b-val').value;
  let f=data.filter(p=>{
    if(kat&&p.kategorija!==kat)return false;
    if(od&&(p.datum||'')<od)return false;
    if(doo&&(p.datum||'')>doo)return false;
    if(val&&p.valuta!==val)return false;
    return true;
  });
  const tot={},naplT={},nenT={};
  f.forEach(p=>{
    const v=p.valuta||'RSD';
    tot[v]=(tot[v]||0)+(p.cena||0);
    if(p.naplaceno)naplT[v]=(naplT[v]||0)+(p.cena||0);
    else nenT[v]=(nenT[v]||0)+(p.cena||0);
  });
  const nap=f.filter(p=>p.naplaceno).length;
  const valute=[...new Set(f.map(p=>p.valuta||'RSD'))];
  const katLabel=kat?(KAT_LABEL[kat]||kat):'Sve kategorije';
  let cards=`<div class="bilans-card"><div class="bc-label">Ukupno poslova</div><div class="bc-val">${f.length}</div><div class="bc-sub">${katLabel} · ${nap} naplać. · ${f.length-nap} nenaplać.</div></div>`;
  valute.forEach(v=>{
    cards+=`<div class="bilans-card zelena"><div class="bc-label">Naplaćeno ${v}</div><div class="bc-val">${num(naplT[v]||0)}</div><div class="bc-sub">${v}</div></div>`;
    cards+=`<div class="bilans-card crvena"><div class="bc-label">Nije naplaćeno ${v}</div><div class="bc-val">${num(nenT[v]||0)}</div><div class="bc-sub">${v}</div></div>`;
  });
  document.getElementById('bilans-cards').innerHTML=cards;
}

function resetBilans(){
  document.getElementById('b-kat').value='';
  document.getElementById('b-od').value='';
  document.getElementById('b-do').value='';
  document.getElementById('b-val').value='';
  renderBilans();
}

// ===== MODAL =====
function openModal(id){
  document.getElementById(id).classList.add('open');
  if(id==='modal-view'){
    document.querySelector('.slike-section').style.display='block';
  }
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(ov=>{
  ov.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

// ===== UTILS =====
function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2);}
function today(){return new Date().toISOString().slice(0,10);}
function nk(s){return(s||'').toLowerCase().replace(/\s+/g,' ').trim();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fDat(d){if(!d)return'—';const[y,m,dd]=d.split('-');return dd+'.'+m+'.'+y+'.';}
function fCena(c,v){if(!c&&c!==0)return'—';return num(c)+' '+(v||'');}
function num(n){return Number(n).toLocaleString('sr-RS');}
function kratko(s,n){n=n||60;if(!s)return'—';return s.length>n?s.substring(0,n)+'…':s;}
